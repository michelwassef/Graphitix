<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>BioVenn-like Venn - HTML + JS only</title>
<style>
  body{margin:0;font-family:system-ui,Segoe UI,Roboto,Helvetica,Arial,sans-serif;background:#ffffff;color:#222;line-height:1.4}
  header{padding:14px 16px;border-bottom:1px solid #ddd;background:#f7f7f7}
  .wrap{display:grid;grid-template-columns:360px 1fr;gap:12px;padding:12px}
  .panel{background:#fff;border:1px solid #ddd;border-radius:8px;padding:12px}
  label{font-size:16px;color:#333}
  textarea{width:100%;min-height:110px;background:#fff;border:1px solid #ccc;color:#000;border-radius:6px;padding:8px;resize:vertical;box-sizing:border-box}
  input[type=text],input[type=number],select{width:100%;background:#fff;border:1px solid #ccc;color:#000;border-radius:6px;padding:8px;box-sizing:border-box}
  .row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
  .btn{background:#fff;border:1px solid #ccc;color:#333;border-radius:6px;padding:8px 12px;cursor:pointer}
  .btn:hover{background:#f0f0f0}
  .svgbox{background:#fff;border:1px solid #ddd;border-radius:8px;padding:8px;margin:8px 0}
  #stage{width:100%;max-width:500px;height:340px;display:block}
  .color-picker{display:flex;align-items:center;gap:6px}
  .diagram-area{display:flex;gap:12px;align-items:flex-start}
  .config-options{display:flex;flex-direction:column;gap:12px;min-width:140px}
  .config-options fieldset{border:none;padding:0;margin:0}
  .config-options legend{font-size:14px;font-weight:600;margin-bottom:4px}
  .config-options .color-pickers{display:flex;flex-direction:column;gap:8px}
  .config-options .color-pickers label{display:flex;align-items:center;gap:4px;font-size:14px}
  .config-options .control{display:flex;align-items:center;gap:6px;font-size:14px}
  .config-options .control label{width:90px}
  .config-options .control input[type=range]{flex:1}
  .config-options .control output{width:36px;text-align:right}
  details{background:#fff;border:1px solid #ddd;border-radius:8px;padding:8px}
  @media (max-width:1000px){.wrap{grid-template-columns:1fr}#stage{height:280px}}
  #tooltip{position:absolute;background:#fff;border:1px solid #ccc;border-radius:4px;padding:8px;display:none;column-width:160px;column-gap:12px;z-index:1000;overflow:visible;}
  .analysis-controls{flex-wrap:nowrap}
  .analysis-controls label{display:flex;align-items:center;gap:4px}
  .analysis-controls select{width:auto}
  .gene-item{display:flex;align-items:center;gap:2px;margin-right:0;margin-bottom:4px}
  .gene-link{cursor:pointer;margin-left:0}
</style>
</head>
<body>
<header><h2 style="margin:0">Area proportional Venn - BioVenn like</h2><div style="color:#555;font-size:13px">Paste lists or enter counts, draw the Venn, inspect regions, export SVG or PNG.</div></header>
<div class="wrap">
  <div class="panel">
    <div class="row">
      <div style="flex:1 1 100%">
        <label>Set A label</label><input id="labelA" type="text" value="A">
        <label>List A</label><textarea id="listA"></textarea>
      </div>
      <div style="flex:1 1 100%">
        <label>Set B label</label><input id="labelB" type="text" value="B">
        <label>List B</label><textarea id="listB"></textarea>
      </div>
      <div style="flex:1 1 100%">
        <label>Set C label</label><input id="labelC" type="text" value="C">
        <label>List C - optional</label><textarea id="listC"></textarea>
      </div>
    </div>
    <div class="row" style="margin-top:6px">
      <label><input id="caseSensitive" type="checkbox"> Case sensitive</label>
      <label>Delimiter
        <select id="delimiter">
          <option value="auto">Auto</option><option value="newline">Newline</option><option value="comma">Comma</option><option value="tab">Tab</option><option value="space">Spaces</option>
        </select>
      </label>
      <button class="btn" id="draw">Draw Venn</button>
      <button class="btn" id="sample">Example</button>
      <button class="btn" id="reset">Reset</button>
    </div>
    <details style="margin-top:8px">
      <summary>Numeric mode - counts only</summary>
      <div class="row">
        <div><label>|A|</label><input id="nA" type="number" min="0" value="0"></div>
        <div><label>|B|</label><input id="nB" type="number" min="0" value="0"></div>
        <div><label>|C|</label><input id="nC" type="number" min="0" value="0"></div>
        <div><label>|A∩B|</label><input id="nAB" type="number" min="0" value="0"></div>
        <div><label>|A∩C|</label><input id="nAC" type="number" min="0" value="0"></div>
        <div><label>|B∩C|</label><input id="nBC" type="number" min="0" value="0"></div>
        <div><label>|A∩B∩C|</label><input id="nABC" type="number" min="0" value="0"></div>
        <button class="btn" id="useNumeric">Use numeric</button>
      </div>
    </details>
    </div>
  <div class="panel">
    <div class="diagram-area">
      <div class="svgbox">
        <svg id="stage" viewBox="0 0 500 340" xmlns="http://www.w3.org/2000/svg" aria-label="Venn diagram"></svg>
        <div class="row" style="justify-content:flex-end;margin-top:6px">
          <button class="btn" id="exportSVG">Export SVG</button>
          <button class="btn" id="exportPNG">Export PNG</button>
        </div>
      </div>
      <div class="config-options">
        <fieldset>
          <legend>Set colors</legend>
          <div class="color-pickers">
            <label class="color-picker"><input id="colorA" type="color" value="#e74c3c" aria-label="Color for set A"><span id="colorLabelA">A</span></label>
            <label class="color-picker"><input id="colorB" type="color" value="#2ecc71" aria-label="Color for set B"><span id="colorLabelB">B</span></label>
            <label class="color-picker"><input id="colorC" type="color" value="#3498db" aria-label="Color for set C"><span id="colorLabelC">C</span></label>
          </div>
        </fieldset>
        <fieldset>
          <legend>Appearance</legend>
          <div class="control">
            <label for="opacity">Opacity</label>
            <input id="opacity" type="range" min="0.05" max="0.9" step="0.05" value="0.75">
            <output id="opacityVal">0.75</output>
          </div>
          <div class="control">
            <label for="borderColor">Border color</label>
            <input id="borderColor" type="color" value="#999999" aria-label="Diagram border color">
          </div>
          <div class="control">
            <label for="borderWidth">Border width</label>
            <input id="borderWidth" type="range" min="0" max="10" step="0.1" value="1.2">
            <output id="borderWidthVal">1.2</output>
            <span>px</span>
          </div>
          <div class="control">
            <label for="fontsize">Font size</label>
            <input id="fontsize" type="range" min="10" max="36" step="1" value="16">
            <output id="fontsizeVal">16</output>
            <span>px</span>
          </div>
        </fieldset>
      </div>
    </div>
    <div class="row" style="margin-top:8px">
      <select id="regionSelect">
        <option value="A">A only</option><option value="B">B only</option><option value="C">C only</option>
        <option value="AB">A∩B only</option><option value="AC">A∩C only</option><option value="BC">B∩C only</option><option value="ABC">A∩B∩C</option>
      </select>
    </div>
    <div id="regionListContainer" style="position:relative;margin-top:6px">
      <button class="btn" id="copyRegionBtn" style="position:absolute;top:4px;right:4px;display:none;font-size:12px;padding:4px 8px">Copy</button>
      <div id="regionList" style="background:#fafafa;border:1px solid #ddd;border-radius:8px;padding:24px 8px 8px;max-height:190px;overflow:auto"></div>
    </div>
    <div class="row analysis-controls" style="margin-top:6px">
      <label>Species
        <select id="speciesSelect">
          <option value="" selected>Select species</option>
          <option value="hsapiens" data-string="9606">H. sapiens</option>
          <option value="mmusculus" data-string="10090">M. musculus</option>
          <option value="dmelanogaster" data-string="7227">D. melanogaster</option>
          <option value="celegans" data-string="6239">C. elegans</option>
        </select>
      </label>
      <button class="btn" id="goBtn">GO analysis</button>
      <button class="btn" id="stringBtn">STRING analysis</button>
    </div>
    <div id="analysisResults" style="background:#fafafa;border:1px solid #ddd;border-radius:8px;padding:8px;max-height:400px;overflow:auto;margin-top:6px">
      <div id="goResults"></div>
      <div id="stringSection" style="display:flex;gap:8px;margin-top:8px;align-items:flex-start">
        <div id="stringResults"></div>
        <div id="stringNetwork"></div>
      </div>
    </div>
    <div class="row" style="margin-top:6px;font-size:13px;color:#333">
      <span><span id="labelAName">A</span>: <code id="countA">0</code></span><span><span id="labelBName">B</span>: <code id="countB">0</code></span><span><span id="labelCName">C</span>: <code id="countC">0</code></span>
      <span><span id="labelABName">A∩B</span>: <code id="countAB">0</code></span><span><span id="labelACName">A∩C</span>: <code id="countAC">0</code></span><span><span id="labelBCName">B∩C</span>: <code id="countBC">0</code></span>
      <span><span id="labelABCName">A∩B∩C</span>: <code id="countABC">0</code></span>
    </div>
  </div>
</div>
<div id="tooltip"></div>

<script>
(function(){
  "use strict";
  const $ = (s)=>document.querySelector(s);
  const stage = $('#stage');
  console.debug('App initialized');
  const inputs = {
    A: $('#listA'), B: $('#listB'), C: $('#listC'),
    labelA: $('#labelA'), labelB: $('#labelB'), labelC: $('#labelC'),
    colorA: $('#colorA'), colorB: $('#colorB'), colorC: $('#colorC'),
    opacity: $('#opacity'), fontsize: $('#fontsize'), borderColor: $('#borderColor'), borderWidth: $('#borderWidth'),
    opacityVal: $('#opacityVal'), fontsizeVal: $('#fontsizeVal'), borderWidthVal: $('#borderWidthVal'),
    caseSensitive: $('#caseSensitive'), delimiter: $('#delimiter'),
    counts: { nA: $('#nA'), nB: $('#nB'), nC: $('#nC'), nAB: $('#nAB'), nAC: $('#nAC'), nBC: $('#nBC'), nABC: $('#nABC') }
  };
  console.debug('inputs initialized', {
    colorA: inputs.colorA.value,
    colorB: inputs.colorB.value,
    colorC: inputs.colorC.value,
    opacity: inputs.opacity.value,
    borderColor: inputs.borderColor.value
  });
  console.debug('fieldsets configured', document.querySelectorAll('.config-options fieldset').length);
  function handlePlainPaste(e){
    console.debug('handlePlainPaste triggered', e.target.id);
    e.preventDefault();
    const text=(e.clipboardData||window.clipboardData).getData('text/plain').replace(/\r/g,'').replace(/\u00A0/g,' ');
    document.execCommand('insertText', false, text);
  }
  [inputs.A,inputs.B,inputs.C].forEach(el=>el.addEventListener('paste',handlePlainPaste));
  const STYLE_KEY='vennStylePrefs';
  function loadStylePrefs(){
    try{
      const saved=JSON.parse(localStorage.getItem(STYLE_KEY));
      console.debug('loadStylePrefs', saved);
      if(saved){
        if(saved.colorA) inputs.colorA.value=saved.colorA;
        if(saved.colorB) inputs.colorB.value=saved.colorB;
        if(saved.colorC) inputs.colorC.value=saved.colorC;
        if(saved.opacity) inputs.opacity.value=saved.opacity;
        if(saved.fontsize) inputs.fontsize.value=saved.fontsize;
        if(saved.borderColor) inputs.borderColor.value=saved.borderColor;
        if(saved.borderWidth) inputs.borderWidth.value=saved.borderWidth;
      }
      inputs.opacityVal.textContent=inputs.opacity.value;
      inputs.fontsizeVal.textContent=inputs.fontsize.value;
      inputs.borderWidthVal.textContent=inputs.borderWidth.value;
    }catch(err){ console.error('loadStylePrefs error', err); }
  }
  function saveStylePrefs(){
    const prefs={
      colorA: inputs.colorA.value,
      colorB: inputs.colorB.value,
      colorC: inputs.colorC.value,
      opacity: inputs.opacity.value,
      fontsize: inputs.fontsize.value,
      borderColor: inputs.borderColor.value,
      borderWidth: inputs.borderWidth.value
    };
    console.debug('saveStylePrefs', prefs);
    try{ localStorage.setItem(STYLE_KEY, JSON.stringify(prefs)); }
    catch(err){ console.error('saveStylePrefs error', err); }
  }
  loadStylePrefs();
  inputs.opacity.addEventListener('input',()=>{ inputs.opacityVal.textContent=inputs.opacity.value; console.debug('opacity changed', inputs.opacity.value); refreshDiagram(); saveStylePrefs(); });
  inputs.fontsize.addEventListener('input',()=>{ inputs.fontsizeVal.textContent=inputs.fontsize.value; console.debug('fontsize changed', inputs.fontsize.value); refreshDiagram(); saveStylePrefs(); });
  ['colorA','colorB','colorC'].forEach(id=>{
    inputs[id].addEventListener('input',e=>{ console.debug('color changed', id, e.target.value); refreshDiagram(); saveStylePrefs(); });
  });
  ['labelA','labelB','labelC'].forEach(id=>{
    inputs[id].addEventListener('input',()=>{
      const labels={A:inputs.labelA.value||'A',B:inputs.labelB.value||'B',C:inputs.labelC.value||'C'};
      console.debug('label changed', labels);
      updateColorLabels(labels);
      updateRegionSelect(labels);
      updateCountLabels(labels);
    });
  });
  updateColorLabels({A:inputs.labelA.value||'A',B:inputs.labelB.value||'B',C:inputs.labelC.value||'C'});
  inputs.borderColor.addEventListener('input',e=>{ console.debug('border color changed', e.target.value); refreshDiagram(); saveStylePrefs(); });
  inputs.borderWidth.addEventListener('input',()=>{ inputs.borderWidthVal.textContent=inputs.borderWidth.value; console.debug('border width changed', inputs.borderWidth.value); refreshDiagram(); saveStylePrefs(); });

  function splitItems(text, mode){
    if(mode==='newline'){
      const parts=text.split(/\r?\n/);
      console.debug('splitItems newline',parts);
      return parts;
    }
    if(mode==='comma'){
      const parts=text.split(/,/);
      console.debug('splitItems comma',parts);
      return parts;
    }
    if(mode==='tab'){
      const parts=text.split(/\t/);
      console.debug('splitItems tab',parts);
      return parts;
    }
    if(mode==='space'){
      const parts=text.split(/\s+/);
      console.debug('splitItems space',parts);
      return parts;
    }
    const parts=text.split(/[\r\n,\t;\s]+/);
    console.debug('splitItems auto',parts);
    return parts;
  }
  function parseList(raw, cs, mode){
    const arr = splitItems(raw.trim(), mode).map(s=>s.trim()).filter(Boolean);
    const seen=new Set(), out=[];
    for(const x of arr){
      const key=cs?x:x.toLowerCase();
      if(!seen.has(key)){
        seen.add(key);
        out.push({key,val:x});
      }
    }
    console.debug('parseList', {raw, mode, out});
    return out;
  }
  function setsFromLists(listA, listB, listC){
    console.debug('setsFromLists input', {listA, listB, listC});
    const mapA=new Map(listA.map(o=>[o.key,o.val]));
    const mapB=new Map(listB.map(o=>[o.key,o.val]));
    const mapC=new Map(listC.map(o=>[o.key,o.val]));
    const keysA=new Set(mapA.keys()), keysB=new Set(mapB.keys()), keysC=new Set(mapC.keys());
    const inter=(S,T)=>new Set([...S].filter(x=>T.has(x)));
    const diff=(S,T)=>new Set([...S].filter(x=>!T.has(x)));
    const union=(S,T)=>new Set([...S,...T]);
    const ABCk=inter(inter(keysA,keysB),keysC);
    const ABk=diff(inter(keysA,keysB),keysC);
    const ACk=diff(inter(keysA,keysC),keysB);
    const BCk=diff(inter(keysB,keysC),keysA);
    const Aonlyk=diff(keysA,union(keysB,keysC));
    const Bonlyk=diff(keysB,union(keysA,keysC));
    const Conlyk=diff(keysC,union(keysA,keysB));
    const mapVal=(keys,map)=>new Set([...keys].map(k=>map.get(k)));
    const res={
      A:mapVal(keysA,mapA),
      B:mapVal(keysB,mapB),
      C:mapVal(keysC,mapC),
      Aonly:mapVal(Aonlyk,mapA),
      Bonly:mapVal(Bonlyk,mapB),
      Conly:mapVal(Conlyk,mapC),
      AB:mapVal(ABk,mapA),
      AC:mapVal(ACk,mapA),
      BC:mapVal(BCk,mapB),
      ABC:mapVal(ABCk,mapA)
    };
    console.debug('setsFromLists result', res);
    return res;
  }
  function circleIntersectionArea(r1,r2,d){
    if(d>=r1+r2) return 0;
    if(d<=Math.abs(r1-r2)) return Math.PI*Math.min(r1,r2)**2;
    const a=2*Math.acos((r1*r1+d*d-r2*r2)/(2*r1*d));
    const b=2*Math.acos((r2*r2+d*d-r1*r1)/(2*r2*d));
    return 0.5*r1*r1*(a-Math.sin(a)) + 0.5*r2*r2*(b-Math.sin(b));
  }
  function distanceForOverlap(r1,r2,target){
    const maxA=Math.PI*Math.min(r1,r2)**2;
    const t=Math.max(0,Math.min(target,maxA));
    let lo=Math.max(0,Math.abs(r1-r2)), hi=r1+r2;
    for(let i=0;i<60;i++){ const m=(lo+hi)/2; const A=circleIntersectionArea(r1,r2,m); if(A>t) lo=m; else hi=m; }
    return (lo+hi)/2;
  }
  function trilaterate(dAB,dAC,dBC){
    const x=(dAB*dAB+dAC*dAC-dBC*dBC)/(2*(dAB||1e-6));
    const y2=dAC*dAC-x*x; return {Ax:0,Ay:0,Bx:dAB,By:0,Cx:x,Cy:Math.sqrt(Math.max(0,y2))};
  }
  function layoutFromCounts(nA,nB,nC,nAB,nAC,nBC){
    const rA=Math.sqrt(Math.max(nA,0)/Math.PI);
    const rB=Math.sqrt(Math.max(nB,0)/Math.PI);
    const rC=Math.sqrt(Math.max(nC,0)/Math.PI);
    const dAB=distanceForOverlap(rA,rB,Math.max(nAB,0));
    const dAC=distanceForOverlap(rA,rC,Math.max(nAC,0));
    const dBC=distanceForOverlap(rB,rC,Math.max(nBC,0));
    return {...trilaterate(dAB,dAC,dBC), rA,rB,rC,dAB,dAC,dBC};
  }
  function clearSVG(){ while(stage.firstChild) stage.removeChild(stage.firstChild); }
  function makeEl(tag,attrs={},parent=stage){ const el=document.createElementNS('http://www.w3.org/2000/svg',tag); for(const[k,v] of Object.entries(attrs)) el.setAttribute(k,String(v)); parent.appendChild(el); return el; }
  function enableDrag(el){ let drag=false,start={x:0,y:0},orig={x:0,y:0}; el.style.cursor='move';
    el.addEventListener('mousedown',e=>{drag=true; const pt=stage.createSVGPoint(); pt.x=e.clientX; pt.y=e.clientY; const loc=pt.matrixTransform(stage.getScreenCTM().inverse()); start={x:loc.x,y:loc.y}; orig={x:parseFloat(el.getAttribute('x')||'0'),y:parseFloat(el.getAttribute('y')||'0')}; e.preventDefault();});
    window.addEventListener('mousemove',e=>{ if(!drag) return; const pt=stage.createSVGPoint(); pt.x=e.clientX; pt.y=e.clientY; const loc=pt.matrixTransform(stage.getScreenCTM().inverse()); el.setAttribute('x',String(orig.x+(loc.x-start.x))); el.setAttribute('y',String(orig.y+(loc.y-start.y))); });
    window.addEventListener('mouseup',()=>drag=false);
  }

  // ---------- Label placement on circular Venn regions (polylabel over implicit regions)
  function _makeRegionSpec(code, cA, rA, cB, rB, cC, rC, hasC){
    const spec = [];
    const inC  = (ctr,r)=>spec.push({ctr, r, type:'in'});
    const outC = (ctr,r)=>spec.push({ctr, r, type:'out'});

    if(code==='A'){ inC(cA,rA); outC(cB,rB); if(hasC) outC(cC,rC); }
    if(code==='B'){ inC(cB,rB); outC(cA,rA); if(hasC) outC(cC,rC); }
    if(code==='C'){ inC(cC,rC); outC(cA,rA); outC(cB,rB); }
    if(code==='AB'){ inC(cA,rA); inC(cB,rB); if(hasC) outC(cC,rC); }
    if(code==='AC'){ inC(cA,rA); if(hasC) inC(cC,rC); outC(cB,rB); }
    if(code==='BC'){ inC(cB,rB); if(hasC) inC(cC,rC); outC(cA,rA); }
    if(code==='ABC'){ inC(cA,rA); inC(cB,rB); if(hasC) inC(cC,rC); }
    return spec;
  }

  // Signed distance to the region boundary: positive inside, negative outside.
  // Margin for an "inside" constraint is (r - dist); for an "outside" constraint is (dist - r).
  function _signedDistToRegion(x, y, spec){
    let minMargin = Infinity;
    for(const c of spec){
      const dist = Math.hypot(x - c.ctr.x, y - c.ctr.y);
      const margin = (c.type === 'in') ? (c.r - dist) : (dist - c.r);
      if(margin < minMargin) minMargin = margin;
    }
    return minMargin;
  }

  // Bounding box for search: intersection of the bounding boxes of all "inside" circles.
  function _bboxForSpec(spec){
    const ins = spec.filter(c => c.type === 'in');
    if(!ins.length) return null;
    let b = {x1: -Infinity, y1: -Infinity, x2: Infinity, y2: Infinity};
    for(const c of ins){
      const bb = {x1: c.ctr.x - c.r, y1: c.ctr.y - c.r, x2: c.ctr.x + c.r, y2: c.ctr.y + c.r};
      b = { x1: Math.max(b.x1, bb.x1), y1: Math.max(b.y1, bb.y1),
            x2: Math.min(b.x2, bb.x2), y2: Math.min(b.y2, bb.y2) };
    }
    if(b.x1 >= b.x2 || b.y1 >= b.y2) return null;
    return b;
  }

  // Simple priority-queue based "polylabel" over the implicit region
  function _polylabelRegion(spec, bbox, tolerancePx){
    // A cell is a square defined by center (x,y) and half-size h. max = d + h*sqrt(2)
    function makeCell(x, y, h){
      const d = _signedDistToRegion(x, y, spec);
      return {x, y, h, d, max: d + h*Math.SQRT2};
    }

    const width  = bbox.x2 - bbox.x1;
    const height = bbox.y2 - bbox.y1;
    const size   = Math.max(width, height);
    const h0     = size / 2;
    const nInit  = 4; // 4x4 initial grid
    const step   = size / nInit;

    // Priority queue as array with manual sorting. OK for tiny queues.
    const queue = [];
    function push(c){ queue.push(c); }
    function pop(){ queue.sort((a,b)=>b.max - a.max); return queue.shift(); }

    // Build initial grid
    for(let x = bbox.x1; x < bbox.x2 + 1e-6; x += step){
      for(let y = bbox.y1; y < bbox.y2 + 1e-6; y += step){
        push(makeCell(x + step/2, y + step/2, step/2));
      }
    }

    // Best point starts at bbox center (works even when outside, d will be negative)
    let best = makeCell((bbox.x1+bbox.x2)/2, (bbox.y1+bbox.y2)/2, h0);
    if(best.d < 0){
      // Try to seed with any inside cell if available
      for(const c of queue){ if(c.d > best.d) best = c; }
    }
    console.debug('polylabel seed', {bestD: best.d.toFixed(3), step: step.toFixed(2)});

    while(queue.length){
      const cell = pop();
      if(cell.d > best.d) best = cell;
      // If this cell cannot improve beyond current best by more than tolerance, skip subdividing
      if(cell.max - best.d <= tolerancePx) continue;
      // Subdivide into 4 children
      const h = cell.h / 2;
      push(makeCell(cell.x - h, cell.y - h, h));
      push(makeCell(cell.x + h, cell.y - h, h));
      push(makeCell(cell.x - h, cell.y + h, h));
      push(makeCell(cell.x + h, cell.y + h, h));
    }

    // If best.d is still <= 0 we failed to find an inside center. Fallback to bbox center.
    if(best.d <= 0){
      console.debug('polylabel fallback, best.d <= 0', best.d);
    }else{
      console.debug('polylabel best inside', {x: best.x, y: best.y, d: best.d.toFixed(3)});
    }
    return {x: best.x, y: best.y};
  }

  // Entry point: returns pixel coords for the label point of a region code.
  function _findRegionLabelPoint(code, cA, rA, cB, rB, cC, rC, hasC, tolerancePx){
    const spec = _makeRegionSpec(code, cA, rA, cB, rB, cC, rC, hasC);
    const bbox = _bboxForSpec(spec);
    if(!bbox){
      console.debug('bboxForSpec returned null for', code);
      return null;
    }
    const tol = Math.max(0.25, tolerancePx||0.5);
    const pt  = _polylabelRegion(spec, bbox, tol);
    console.debug('region label point', code, pt);
    return pt;
  }

  function fitAndDraw(d, style, labels, counts){
    clearSVG();
    const W=500,H=340,pad=20,labelPad=style.fontsize*2;
    const xs=[d.Ax-d.rA,d.Ax+d.rA,d.Bx-d.rB,d.Bx+d.rB]; const ys=[d.Ay-d.rA,d.Ay+d.rA,d.By-d.rB,d.By+d.rB];
    if(counts.nC>0){ xs.push(d.Cx-d.rC,d.Cx+d.rC); ys.push(d.Cy-d.rC,d.Cy+d.rC); }
    const minX=Math.min.apply(null,xs), maxX=Math.max.apply(null,xs);
    const minY=Math.min.apply(null,ys), maxY=Math.max.apply(null,ys);
    const scale=Math.min((W-2*pad)/Math.max(1e-6,maxX-minX),(H-2*pad-2*labelPad)/Math.max(1e-6,maxY-minY));
    const tx=(W-scale*(minX+maxX))/2;
    const ty=(H-2*labelPad-scale*(minY+maxY))/2+labelPad;
    console.debug('fitAndDraw scale', {labelPad,scale,tx,ty});
    function toPx(x,y){ return {x:x*scale+tx,y:y*scale+ty}; }
    const circles=[{id:'A',x:d.Ax,y:d.Ay,r:d.rA,color:style.colorA},{id:'B',x:d.Bx,y:d.By,r:d.rB,color:style.colorB}];
    if(counts.nC>0) circles.push({id:'C',x:d.Cx,y:d.Cy,r:d.rC,color:style.colorC});
    for(const c of circles){ const p=toPx(c.x,c.y); makeEl('circle',{cx:p.x,cy:p.y,r:c.r*scale,fill:c.color,'fill-opacity':style.opacity,stroke:style.borderColor,'stroke-width':style.borderWidth}); console.debug('circle drawn', c.id); }
    function addText(txt,x,y,regionCode){
      const t=makeEl('text',{x:x,y:y,'font-size':style.fontsize,'text-anchor':'middle',fill:'#333'});
      t.textContent=txt;
      if(regionCode){
        const genes=getRegionText(regionCode).split(/\n/).filter(g=>g);
        console.debug('tooltip data prepared', regionCode, genes.length);
        t.addEventListener('mouseenter',e=>{
          console.debug('tooltip show', regionCode);

          tooltip.style.fontSize='12px';
          tooltip.style.maxHeight='none';
          tooltip.style.maxWidth='none';
          tooltip.style.overflow='visible';
          tooltip.style.width='auto';
          tooltip.style.height='auto';
          const lineHeight=parseFloat(getComputedStyle(tooltip).lineHeight);
          const tempSpan=document.createElement('span');
          tempSpan.style.visibility='hidden';
          tempSpan.style.position='absolute';
          tempSpan.style.fontSize='12px';
          tempSpan.style.whiteSpace='pre';
          document.body.appendChild(tempSpan);
          let longestWidth=0;
          genes.forEach(g=>{ tempSpan.textContent=g; const w=tempSpan.getBoundingClientRect().width; if(w>longestWidth) longestWidth=w; });
          document.body.removeChild(tempSpan);
          const columnGap=12;
          const columnWidth=Math.ceil(longestWidth)+16;
          console.debug('tooltip column metrics', {longestWidth,columnWidth});
          const maxWidth=window.innerWidth-16, maxHeight=window.innerHeight-16;
          const maxCols=Math.max(1,Math.floor((maxWidth+columnGap)/(columnWidth+columnGap)));
          const maxRows=Math.max(1,Math.floor(maxHeight/lineHeight));
          let columns=Math.min(maxCols,Math.ceil(genes.length/maxRows));
          let rowsPerCol=Math.ceil(genes.length/columns);
          const width=columns*columnWidth+(columns-1)*columnGap;
          const height=rowsPerCol*lineHeight;
          tooltip.style.columnCount=columns;
          tooltip.style.columnWidth=columnWidth+'px';
          tooltip.style.columnGap=columnGap+'px';
          tooltip.style.width=width+'px';
          tooltip.style.height=height+'px';
          console.debug('tooltip dimensions set', {genes:genes.length,columns,rowsPerCol,width,height});
          const box=e.target.getBoundingClientRect();
          let left=box.right+window.scrollX+8;
          let top=box.top+window.scrollY;
          tooltip.style.left=left+'px';
          tooltip.style.top=top+'px';

        t.addEventListener('mouseleave',()=>{
          console.debug('tooltip hide', regionCode);
          tooltip.style.display='none';
        });
      }
      enableDrag(t);
      return t;
    }
    const labelBoxes=[];
    function placeCircleLabel(circle,label,count){
      const center=toPx(circle.x,circle.y);
      const others=circles.filter(c=>c.id!==circle.id);
      const isTop=others.every(o=>circle.y<=o.y);
      const margin=style.fontsize*0.6;
        let y=center.y+(isTop?-(circle.r*scale+margin):(circle.r*scale+margin));
        const t=addText(label+' ('+count+')',center.x,y);
        console.debug('label placed',circle.id,{isTop,x:center.x,y});
        let box=t.getBBox();
        for(const b of labelBoxes){
          while(!(box.x+box.width<b.x||b.x+b.width<box.x||box.y+box.height<b.y||b.y+b.height<box.y)){
            y+=isTop?-style.fontsize:style.fontsize;
            t.setAttribute('y',y);
            box=t.getBBox();
            console.debug('label adjusted',circle.id,{x:center.x,y});
          }
        }
        const minYBound=style.fontsize;
        const maxYBound=H-style.fontsize;
        if(box.y<minYBound){
          y+=minYBound-box.y;
          t.setAttribute('y',y);
          box=t.getBBox();
          console.debug('label clamped top',circle.id,{x:center.x,y});
        }
        if(box.y+box.height>maxYBound){
          y-=box.y+box.height-maxYBound;
          t.setAttribute('y',y);

        }
        labelBoxes.push(box);

    if(counts.nC>0) placeCircleLabel({id:'C',x:d.Cx,y:d.Cy,r:d.rC},labels.C,counts.nC);
    const cA=toPx(d.Ax,d.Ay), cB=toPx(d.Bx,d.By), cC=toPx(d.Cx,d.Cy);
    const rAp=d.rA*scale, rBp=d.rB*scale, rCp=d.rC*scale;

    // --- New optimal placement for region numbers (uses _findRegionLabelPoint) ---
    const hasC = counts.nC > 0;

    // A only
    if(counts.Aonly){
      const p = _findRegionLabelPoint('A', cA, rAp, cB, rBp, cC, rCp, hasC, 0.6);
      if(p) addText(String(counts.Aonly), p.x, p.y, 'A');
    }
    // B only
    if(counts.Bonly){
      const p = _findRegionLabelPoint('B', cA, rAp, cB, rBp, cC, rCp, hasC, 0.6);
      if(p) addText(String(counts.Bonly), p.x, p.y, 'B');
    }

    if(hasC && counts.Conly){
      const p = _findRegionLabelPoint('C', cA, rAp, cB, rBp, cC, rCp, hasC, 0.6);
      if(p) addText(String(counts.Conly), p.x, p.y, 'C');
    }

    // A∩B only
    if(counts.AB){
      const p = _findRegionLabelPoint('AB', cA, rAp, cB, rBp, cC, rCp, hasC, 0.6);
      if(p) addText(String(counts.AB), p.x, p.y, 'AB');
    }
    // A∩C only
    if(hasC && counts.AC){
      const p = _findRegionLabelPoint('AC', cA, rAp, cB, rBp, cC, rCp, hasC, 0.6);
      if(p) addText(String(counts.AC), p.x, p.y, 'AC');
    }
    // B∩C only
    if(hasC && counts.BC){
      const p = _findRegionLabelPoint('BC', cA, rAp, cB, rBp, cC, rCp, hasC, 0.6);
      if(p) addText(String(counts.BC), p.x, p.y, 'BC');
    }
    // A∩B∩C
    if(hasC && counts.ABC){
      const p = _findRegionLabelPoint('ABC', cA, rAp, cB, rBp, cC, rCp, hasC, 0.6);
      if(p) addText(String(counts.ABC), p.x, p.y, 'ABC');
    }
    stage.onclick=(evt)=>{
      const pt=stage.createSVGPoint(); pt.x=evt.clientX; pt.y=evt.clientY; const loc=pt.matrixTransform(stage.getScreenCTM().inverse());
      const inA=Math.hypot(loc.x-cA.x,loc.y-cA.y)<=rAp, inB=Math.hypot(loc.x-cB.x,loc.y-cB.y)<=rBp, inC=(counts.nC>0)&&Math.hypot(loc.x-cC.x,loc.y-cC.y)<=rCp;
      let region=null;
      if(inA&&!inB&&!inC) region='A'; else if(!inA&&inB&&!inC) region='B'; else if(!inA&&!inB&&inC) region='C';
      else if(inA&&inB&&!inC) region='AB'; else if(inA&&inC&&!inB) region='AC'; else if(inB&&inC&&!inA) region='BC'; else if(inA&&inB&&inC) region='ABC';
      if(region){ $('#regionSelect').value=region; populateRegion(region); }
    };
  }

  function guessSpecies(genes){
    console.debug('guessSpecies called', genes);
    const score={hsapiens:0,mmusculus:0,dmelanogaster:0,celegans:0};
    genes.forEach(g=>{
      if(/^[A-Z0-9]+$/.test(g)) score.hsapiens++;
      if(/^[A-Z][a-z0-9]+$/.test(g)) score.mmusculus++;
      if(/^CG\d+$/.test(g)||/^FBgn\d+$/.test(g)) score.dmelanogaster++;
      if(/^[a-z]{3,}-\d+/.test(g)) score.celegans++;
    });
    console.debug('guessSpecies score', score);
    const entries=Object.entries(score);
    const total=entries.reduce((s,[,v])=>s+v,0);
    if(total===0) return null;
    const [best,bestScore]=entries.reduce((m,e)=>e[1]>m[1]?e:m,['',0]);
    if(bestScore/total<0.5) return null;
    console.debug('guessSpecies best', best, bestScore, total);
    return best;
  }

      console.debug('GO analysis HTTP status', r.status);
      if(!r.ok) throw new Error('GO API HTTP '+r.status);
      return r.json();
    }).then(d=>{
      console.debug('GO analysis response', d);
      lastGOResult=d.result||[];
      console.debug('GO analysis result stored', lastGOResult.length);
      if(lastGOResult.length){
        renderGOResults(5);
      }else{
        goResults.innerHTML='<div>No GO results</div>';
      }
    }).catch(err=>{
      console.error('GO analysis error', err);
      goResults.innerHTML='<div>Error fetching GO analysis</div>';
    });
  }

  function runStringAnalysis(genes, organism){
    console.debug('runStringAnalysis called', genes, organism);
    const formatted=genes.map(g=>g.trim().toUpperCase()).filter(x=>x);
    console.debug('STRING analysis formatted genes', formatted);
    if(!formatted.length){ stringNetwork.innerHTML=''; stringResults.innerHTML='<i>No genes for analysis</i>'; return; }
    stringNetwork.innerHTML='<i>Loading STRING network...</i>';
    stringResults.innerHTML='<i>Running STRING enrichment...</i>';
    const params=new URLSearchParams();
    const joinedIds=formatted.join('\n');
    console.debug('STRING joined identifiers', joinedIds);
    params.set('identifiers', joinedIds);
    const org=organism || speciesSelect.value;
    console.debug('STRING analysis organism', org);
    const stringMap={hsapiens:'9606',mmusculus:'10090',dmelanogaster:'7227',celegans:'6239'};
    const stringSpecies=stringMap[org]||speciesSelect.selectedOptions[0]?.dataset.string||'9606';
    console.debug('STRING analysis species', stringSpecies);
    params.set('species', stringSpecies);
    console.debug('STRING analysis request params', params.toString());
    const networkUrl='https://string-db.org/api/image/network?'+params.toString();
    console.debug('STRING network image URL', networkUrl);
    const img=new Image();
    img.src=networkUrl;
    img.alt='STRING network graph';
    img.style.maxWidth='150%';
    console.debug('STRING network image dimensions set', {width:img.width,height:img.height});
    img.onload=()=>console.debug('STRING network image loaded');
    img.onerror=e=>console.error('STRING network image error', e);
    stringNetwork.innerHTML='';
    stringNetwork.appendChild(img);
    fetch('https://string-db.org/api/json/enrichment?'+params.toString())
    .then(r=>{
      console.debug('STRING analysis HTTP status', r.status);
      if(!r.ok) throw new Error('STRING API HTTP '+r.status);
      return r.json();
    }).then(d=>{
      console.debug('STRING analysis response', d);
      if(Array.isArray(d)){
        const items=d.slice(0,5).map(r=>{
          const desc=r.termDescription||r.description||'unknown term';
          console.debug('STRING result item', r, desc);
          return '<div>'+desc+' (FDR='+Number(r.fdr).toExponential(2)+')</div>';
        }).join('');
        stringResults.innerHTML='<strong>STRING enrichment</strong>'+items;
      }else{
        stringResults.innerHTML='<div>No STRING results</div>';
      }
    }).catch(err=>{
      console.error('STRING analysis error', err);
      stringResults.innerHTML='<div>Error fetching STRING analysis</div>';
    });
  }

  function refreshCounts(c){
    console.debug('refreshCounts called', c);
    countsUI.A.textContent=c.nA;
    countsUI.B.textContent=c.nB;
    countsUI.C.textContent=c.nC;
    countsUI.AB.textContent=c.AB+c.ABC;
    countsUI.AC.textContent=c.AC+c.ABC;
    countsUI.BC.textContent=c.BC+c.ABC;
    countsUI.ABC.textContent=c.ABC;
  }

  function updateCountLabels(labels){
    console.debug('updateCountLabels called', labels);
    $('#labelAName').textContent=labels.A;
    $('#labelBName').textContent=labels.B;
    $('#labelCName').textContent=labels.C;
    $('#labelABName').textContent=labels.A+'∩'+labels.B;
    $('#labelACName').textContent=labels.A+'∩'+labels.C;
    $('#labelBCName').textContent=labels.B+'∩'+labels.C;
    $('#labelABCName').textContent=labels.A+'∩'+labels.B+'∩'+labels.C;
  }

  function updateRegionSelect(labels){
    console.debug('updateRegionSelect called', labels);
    const map={
      A:labels.A+' only',
      B:labels.B+' only',
      C:labels.C+' only',
      AB:labels.A+'∩'+labels.B+' only',
      AC:labels.A+'∩'+labels.C+' only',
      BC:labels.B+'∩'+labels.C+' only',
      ABC:labels.A+'∩'+labels.B+'∩'+labels.C
    };
    [...regionSelect.options].forEach(o=>{ if(map[o.value]) o.textContent=map[o.value]; });
  }

  function updateColorLabels(labels){
    console.debug('updateColorLabels called', labels);
    $('#colorLabelA').textContent=labels.A;
    $('#colorLabelB').textContent=labels.B;
    $('#colorLabelC').textContent=labels.C;
  }

  function drawFromLists(){
    console.debug('drawFromLists triggered');
    const mode=inputs.delimiter.value, cs=inputs.caseSensitive.checked;
    const A=parseList(inputs.A.value,cs,mode), B=parseList(inputs.B.value,cs,mode), C=parseList(inputs.C.value,cs,mode);
    const regions=setsFromLists(A,B,C); lastRegions=regions; lastDrawMode='lists';
    const counts={nA:regions.A.size,nB:regions.B.size,nC:regions.C.size,Aonly:regions.Aonly.size,Bonly:regions.Bonly.size,Conly:regions.Conly.size,AB:regions.AB.size,AC:regions.AC.size,BC:regions.BC.size,ABC:regions.ABC.size};
    refreshCounts(counts);
    const pairs={nAB:counts.AB+counts.ABC,nAC:counts.AC+counts.ABC,nBC:counts.BC+counts.ABC};
    const L=layoutFromCounts(counts.nA,counts.nB,counts.nC,pairs.nAB,pairs.nAC,pairs.nBC);
    const style={colorA:inputs.colorA.value,colorB:inputs.colorB.value,colorC:inputs.colorC.value,opacity:inputs.opacity.value,fontsize:inputs.fontsize.value,borderColor:inputs.borderColor.value,borderWidth:inputs.borderWidth.value};
    const labels={A:inputs.labelA.value||'A',B:inputs.labelB.value||'B',C:inputs.labelC.value||'C'};
    updateCountLabels(labels); updateRegionSelect(labels); updateColorLabels(labels);
    fitAndDraw(L,style,labels,counts);
    populateRegion(regionSelect.value);
    console.debug('populateRegion after drawFromLists', regionSelect.value);
  }

  function drawFromNumeric(){
    console.debug('drawFromNumeric triggered');
    const nA=+inputs.counts.nA.value||0, nB=+inputs.counts.nB.value||0, nC=+inputs.counts.nC.value||0;
    const nAB=+inputs.counts.nAB.value||0, nAC=+inputs.counts.nAC.value||0, nBC=+inputs.counts.nBC.value||0, nABC=+inputs.counts.nABC.value||0;
    const Aonly=Math.max(0,nA-(nAB+nAC-nABC)), Bonly=Math.max(0,nB-(nAB+nBC-nABC)), Conly=Math.max(0,nC-(nAC+nBC-nABC));
    const counts={nA,nB,nC,Aonly,Bonly,Conly,AB:Math.max(0,nAB-nABC),AC:Math.max(0,nAC-nABC),BC:Math.max(0,nBC-nABC),ABC:nABC};
    lastRegions={A:new Set(),B:new Set(),C:new Set(),Aonly:new Set(),Bonly:new Set(),Conly:new Set(),AB:new Set(),AC:new Set(),BC:new Set(),ABC:new Set()}; lastDrawMode='numeric';
    refreshCounts(counts);
    const L=layoutFromCounts(nA,nB,nC,nAB,nAC,nBC);
    const style={colorA:inputs.colorA.value,colorB:inputs.colorB.value,colorC:inputs.colorC.value,opacity:inputs.opacity.value,fontsize:inputs.fontsize.value,borderColor:inputs.borderColor.value,borderWidth:inputs.borderWidth.value};
    const labels={A:inputs.labelA.value||'A',B:inputs.labelB.value||'B',C:inputs.labelC.value||'C'};
    updateCountLabels(labels); updateRegionSelect(labels); updateColorLabels(labels);
    fitAndDraw(L,style,labels,counts);
    populateRegion(regionSelect.value);
    console.debug('populateRegion after drawFromNumeric', regionSelect.value);
  }

  document.getElementById('draw').addEventListener('click',drawFromLists);
  document.getElementById('useNumeric').addEventListener('click',drawFromNumeric);
  document.getElementById('exportSVG').addEventListener('click',exportSVG);
  document.getElementById('exportPNG').addEventListener('click',exportPNG);
  document.getElementById('sample').addEventListener('click',()=>{
    inputs.labelA.value='Transcriptomic'; inputs.labelB.value='Proteomic'; inputs.labelC.value='Phospho';
    inputs.A.value=`BRCA1
ATM
BAP1
EZH2
SUZ12
RING1B`;
    inputs.B.value=`BRCA1
BAP1
RING1B
CBX2
HDAC1
PAXIP1
HUWE1`;
    inputs.C.value=`BRCA1
PAXIP1
CSNK2A1
RING1B
KAT7`;
    drawFromLists();
  });
  document.getElementById('reset').addEventListener('click',()=>{ inputs.A.value=''; inputs.B.value=''; inputs.C.value=''; Object.values(inputs.counts).forEach(x=>x.value=0); clearSVG(); lastRegions=null; lastDrawMode=null; regionList.textContent=''; Object.values({A:1,B:1,C:1,AB:1,AC:1,BC:1,ABC:1}).forEach((_,i)=>{}); document.getElementById('countA').textContent='0'; document.getElementById('countB').textContent='0'; document.getElementById('countC').textContent='0'; document.getElementById('countAB').textContent='0'; document.getElementById('countAC').textContent='0'; document.getElementById('countBC').textContent='0'; document.getElementById('countABC').textContent='0'; updateCountLabels({A:'A',B:'B',C:'C'}); updateColorLabels({A:'A',B:'B',C:'C'}); updateRegionSelect({A:'A',B:'B',C:'C'}); clearAnalysis(); });
  goBtn.addEventListener('click',()=>{
    console.debug('goBtn clicked');
    const genes=getRegionText(regionSelect.value).split(/\n/).map(g=>g.trim()).filter(x=>x);
    console.debug('goBtn genes', genes);
    let organism=speciesSelect.value;
    console.debug('goBtn organism initial', organism);
    if(!organism){
      const guess=guessSpecies(genes);
      console.debug('goBtn organism guess', guess);
      if(guess){
        speciesSelect.value=organism=guess;
      }else{
        alert('Please select a species before running GO analysis.');
        return;
      }
    }
    runGOAnalysis(genes, organism);
  });
  stringBtn.addEventListener('click',()=>{
    console.debug('stringBtn clicked');
    const genes=getRegionText(regionSelect.value).split(/\n/).map(g=>g.trim()).filter(x=>x);
    console.debug('stringBtn genes', genes);
    let organism=speciesSelect.value;
    console.debug('stringBtn organism initial', organism);
    if(!organism){
      const guess=guessSpecies(genes);
      console.debug('stringBtn organism guess', guess);
      if(guess){
        speciesSelect.value=organism=guess;
      }else{
        alert('Please select a species before running STRING analysis.');
        return;
      }
    }
    runStringAnalysis(genes, organism);
  });
  window.addEventListener('keydown',e=>{ if((e.ctrlKey||e.metaKey)&&e.key==='Enter'){ e.preventDefault(); drawFromLists(); } });
})();
</script>
